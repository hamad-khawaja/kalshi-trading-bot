mode: live

kalshi:
  api_key_id: ""     # Override via KALSHI_API_KEY_ID env var
  private_key_path: ""  # Override via KALSHI_PRIVATE_KEY_PATH env var
  series_ticker: "KXBTC15M"  # Kept for backward compat
  rate_limit_ms: 100
  assets:
    - series_ticker: "KXBTC15M"
      symbol: "BTC"
      primary_ws_url: "wss://ws-feed.exchange.coinbase.com"
      primary_symbol: "BTC-USD"
      secondary_ws_url: "wss://ws.kraken.com/v2"
      secondary_symbol: "BTC/USD"
      chainlink_contract: "0xF4030086522a5bEEa4988F8cA5B36dbC97BeE88c"
    - series_ticker: "KXETH15M"
      symbol: "ETH"
      primary_ws_url: "wss://ws-feed.exchange.coinbase.com"
      primary_symbol: "ETH-USD"
      secondary_ws_url: "wss://ws.kraken.com/v2"
      secondary_symbol: "ETH/USD"
      chainlink_contract: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5b8419"

binance:
  ws_url: "wss://ws-feed.exchange.coinbase.com"
  symbol: "BTC-USD"

strategy:
  poll_interval_seconds: 4
  min_edge_threshold: 0.03
  max_edge_threshold: 0.12
  confidence_min: 0.55
  edge_expiry_decay_enabled: true
  edge_expiry_decay_max: 1.8
  directional_max_spread: 0.15
  mm_max_inventory: 10
  confidence_weight: 0.7
  use_market_maker: true
  mm_min_spread: 0.05
  # Stop-loss
  stop_loss_enabled: true
  stop_loss_pct: 0.20
  stop_loss_min_bid: 0.05
  stop_loss_min_hold_seconds: 60.0
  stop_loss_max_dollar_loss: 2.00        # $100 balance: $2 max loss per SL
  # Trailing take-profit
  trailing_take_profit_enabled: true
  trailing_take_profit_activation_cents: 0.10
  trailing_take_profit_drop_cents: 0.05
  take_profit_min_profit_cents: 0.10
  take_profit_time_decay_floor_cents: 0.05
  take_profit_cooldown_seconds: 900.0
  # Pre-expiry exit
  pre_expiry_exit_enabled: true
  pre_expiry_exit_seconds: 90.0
  # Edge persistence
  edge_confirmation_cycles: 2
  # Thesis-break — disabled
  thesis_break_enabled: false
  thesis_break_threshold: 0.08
  thesis_break_min_hold_seconds: 120.0
  pre_expiry_exit_min_pnl_cents: -0.03
  # Entry filters
  min_entry_price: 0.40
  asset_min_entry_price: {}
  yes_side_edge_multiplier: 1.4
  no_side_edge_multiplier: 1.5
  asset_edge_multipliers:
    ETH: 1.4
  asset_stop_loss_pct:
    ETH: 0.20
  directional_stop_loss_pct: 0.12
  directional_stop_loss_max_dollar: 1.00   # $100 balance: $1 max directional SL
  asset_directional_disabled: [ETH]
  directional_kelly_fraction: 0.10         # Half of global kelly (0.20)
  # Zone filter
  zone_filter_enabled: true
  max_directional_price: 0.70
  zone_edge_multipliers: [0.6, 0.8, 1.0]
  # Phase timing
  phase_filter_enabled: true
  phase_observation_end: 120.0
  phase_confirmation_end: 240.0
  phase_active_end: 840.0
  phase_late_end: 840.0
  phase_late_edge_multiplier: 1.0
  phase_late_confidence_boost: 0.0
  # Overreaction
  overreaction_enabled: true
  overreaction_extreme_threshold: 0.20
  overreaction_momentum_reversal_threshold: 0.002
  # Settlement bias
  settlement_bias_enabled: true
  settlement_bias_weight: 0.08
  # Cross-asset divergence
  cross_asset_divergence_enabled: true
  cross_asset_divergence_weight: 0.06
  # PPE filter
  ppe_filter_enabled: true
  ppe_min_threshold: 0.30
  ppe_kelly_scaling_enabled: true
  # TC extreme vol filter
  tc_extreme_vol_filter_enabled: true
  # Quality score
  min_quality_score: 0.80
  # BTC beta
  btc_beta_enabled: true
  btc_beta_min_signal: 0.20
  # Quiet hours
  quiet_hours_enabled: true
  quiet_hours_est: [17, 18, 19, 20, 21, 0, 1, 2, 3]
  # Settlement ride
  settlement_ride_enabled: true
  settlement_ride_min_elapsed_seconds: 600.0
  settlement_ride_min_edge: 0.06
  settlement_ride_min_implied_distance: 0.12
  settlement_ride_kelly_fraction: 0.10
  asset_settlement_ride_min_edge:
    ETH: 0.08
  asset_settlement_ride_min_implied_distance:
    ETH: 0.22
  asset_market_maker_disabled: []
  asset_mm_min_spread: {ETH: 0.08}
  asset_settlement_ride_disabled: [ETH]
  # Certainty scalp
  certainty_scalp_enabled: true
  certainty_scalp_max_ttx: 240.0
  certainty_scalp_min_ttx: 60.0
  certainty_scalp_min_implied_prob: 0.85
  certainty_scalp_min_model_prob: 0.70
  certainty_scalp_min_edge: 0.02
  certainty_scalp_kelly_fraction: 0.30
  certainty_scalp_min_spot_distance_pct: 0.002
  certainty_scalp_min_fair_value_prob: 0.90
  # Trend continuation
  trend_continuation_enabled: true
  trend_continuation_min_streak: 2
  trend_continuation_max_phase: 2
  trend_continuation_min_implied_prob: 0.35
  trend_continuation_max_implied_prob: 0.65
  trend_continuation_streak_prob: 0.60
  trend_continuation_min_edge: 0.04
  trend_continuation_kelly_fraction: 0.50
  trend_continuation_momentum_threshold: 0.002
  trend_continuation_extended_streak_threshold: 3
  trend_continuation_min_confirming_signals: 3
  trend_continuation_rsi_extreme_threshold: 70.0

risk:
  max_position_per_market: 25          # $100 balance
  max_total_exposure_dollars: 50.0     # 50% of balance
  max_daily_loss_dollars: 30.0         # 30% of balance
  max_concurrent_positions: 5
  kelly_fraction: 0.20                 # Conservative fractional Kelly
  min_balance_dollars: 70.0            # Stop at 30% drawdown ($100 → $70)
  max_trades_per_day: 100
  cooldown_after_streak_minutes: 30
  max_consecutive_losses: 3
  # Drawdown circuit breaker
  drawdown_limit_enabled: true
  drawdown_limit_dollars: 20.0         # $20 peak-to-trough daily limit
  # Entry discipline
  entry_cooldown_seconds: 30
  max_contracts_per_cycle: 15
  # Fee-aware sizing
  fee_extreme_price_threshold: 0.25
  fee_extreme_kelly_multiplier: 1.5
  # Zone-based Kelly scaling
  zone_kelly_multipliers: [1.3, 1.15, 1.0, 0.7, 0.5]
  # Time-based position scaling
  time_scale_enabled: true
  time_scale_full_seconds: 480.0
  time_scale_min_multiplier: 0.4
  # Minimum position size
  min_position_size: 3                 # $100 balance: lower floor
  # Per-asset limits
  asset_max_position:
    ETH: 15
  asset_max_per_cycle:
    ETH: 10

averaging:
  enabled: false
  discount_tiers: [0.10, 0.20, 0.35]
  size_multipliers: [1.0, 1.5, 2.0]
  max_adds_per_position: 3
  min_time_to_expiry_seconds: 120.0
  momentum_threshold: 0.003
  dead_zone: 0.02

binance_futures:
  enabled: true
  symbols: ["BTCUSDT", "ETHUSDT"]
  funding_poll_interval: 45.0

features:
  lookback_seconds: 900
  momentum_windows: [15, 60, 180, 600]
  volatility_window: 300
  orderbook_depth: 10

logging:
  level: INFO
  file: logs/bot.log
  format: json

database:
  path: data/bot.db
